# template-test-unit.yaml
# Run the Microsoft.Identity.Web unit tests.

steps:

- task: VSTest@2
  displayName: 'Run unit tests'
  inputs:
    testSelector: 'testAssemblies'
    testAssemblyVer2: |
        tests\Microsoft.Identity.Web.Test\bin\**\Microsoft.Identity.Web.Test.dll
        tests\Microsoft.Identity.Web.UI.Test\bin\**\Microsoft.Identity.Web.UI.Test.dll
        tests\E2E Tests\Sidecar.Tests\bin\**\Sidecar.Tests.dll
        tests\E2E Tests\OidcIdPSignedAssertionProviderTests\bin\**\OidcIdpSignedAssertionProviderTests.dll
        tests\E2E Tests\CustomSignedAssertionProviderTests\bin\**\CustomSignedAssertionProviderTests.dll
    searchFolder: '$(System.DefaultWorkingDirectory)'
    # Match the GitHub Action: Sidecar.Tests ships E2E/integration classes that
    # need a live sidecar and are excluded there. Skip the same ones here.
    testFiltercriteria: 'FullyQualifiedName!~SidecarEndpointsE2ETests&FullyQualifiedName!~SidecarIntegrationTests'
    runInParallel: true
    codeCoverageEnabled: true
    failOnMinTestsNotRun: true
    minimumExpectedTests: '1'
    runSettingsFile: 'build\CodeCoverage.runsettings'

# VSTest@2 on the hosted agent cannot discover the .NET Framework xUnit tests
# (net472), so the glob above silently runs 0 of them. The GitHub Action covers
# them via 'dotnet test -f net472'; mirror that here. Only the main unit test
# project multi-targets .NET Framework. --no-build reuses the solution build
# output produced earlier in the stage.
- task: DotNetCoreCLI@2
  displayName: 'Run unit tests (.NET Framework 4.7.2)'
  inputs:
    command: 'test'
    projects: 'tests/Microsoft.Identity.Web.Test/Microsoft.Identity.Web.Test.csproj'
    arguments: '--no-restore --no-build --configuration Release --framework net472'
    testRunTitle: 'Unit tests (net472)'
